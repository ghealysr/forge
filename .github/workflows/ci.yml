name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: pip install -e ".[dev]" coverage
      - name: Lint
        run: ruff check forge/
      - name: Format check
        run: ruff format --check forge/
      - name: Type check
        run: mypy --ignore-missing-imports --exclude build --exclude dist forge/
      - name: Tests
        run: pytest forge/tests/ -v
      - name: Coverage
        run: |
          coverage run --source=forge -m pytest forge/tests/
          coverage report --fail-under=65
